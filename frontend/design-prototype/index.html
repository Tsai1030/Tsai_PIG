<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甜蜜食記 — Design Prototype</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&family=Quicksand:wght@400;500;600;700&family=Mochiy+Pop+One&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="m-0 p-0">
  <div id="root"></div>

  <script type="text/babel" src="romantic.jsx"></script>
  <script type="text/babel" src="kawaii.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const PAGES = [
      { id: 'landing', label: 'Landing', group: 'paris' },
      { id: 'login', label: 'Login', group: 'paris' },
      { id: 'her-home', label: '她·首頁', group: 'her' },
      { id: 'her-favorites', label: '她·收藏', group: 'her' },
      { id: 'her-chat', label: '她·對話', group: 'her' },
      { id: 'her-calendar', label: '她·日曆', group: 'her' },
      { id: 'her-map', label: '她·地圖', group: 'her' },
      { id: 'him-home', label: '他·首頁', group: 'him' },
      { id: 'him-favorites', label: '他·收藏', group: 'him' },
      { id: 'him-chat', label: '他·對話', group: 'him' },
      { id: 'him-calendar', label: '他·日曆', group: 'him' },
      { id: 'him-map', label: '他·地圖', group: 'him' },
    ];

    function PreviewNav({ current, onSelect }) {
      let lastGroup = null;
      return (
        <nav className="preview-nav no-select">
          {PAGES.map((p, idx) => {
            const sep = lastGroup && lastGroup !== p.group;
            lastGroup = p.group;
            return (
              <React.Fragment key={p.id}>
                {sep && <span className="group-divider" />}
                <button
                  className={current === p.id ? 'active' : ''}
                  onClick={() => onSelect(p.id)}
                >{p.label}</button>
              </React.Fragment>
            );
          })}
        </nav>
      );
    }

    function App() {
      const [page, setPage] = useState(() => {
        const stored = localStorage.getItem('design-page');
        return stored && PAGES.some(p => p.id === stored) ? stored : 'landing';
      });

      useEffect(() => {
        localStorage.setItem('design-page', page);
        window.scrollTo(0, 0);
      }, [page]);

      const renderPage = () => {
        const goLogin = () => setPage('login');
        const goHome = (role) => setPage(`${role}-home`);
        const Landing = window.LandingPage;
        const Login = window.LoginPage;
        const Home = window.HomePage;
        const Favs = window.FavoritesPage;
        const Chat = window.ChatPage;
        const Cal = window.CalendarPage;
        const Map = window.MapPage;
        switch (page) {
          case 'landing': return <Landing onEnter={goLogin} />;
          case 'login': return <Login onLogin={goHome} />;
          case 'her-home': return <Home role="her" go={setPage} />;
          case 'her-favorites': return <Favs role="her" />;
          case 'her-chat': return <Chat role="her" />;
          case 'her-calendar': return <Cal role="her" />;
          case 'her-map': return <Map role="her" />;
          case 'him-home': return <Home role="him" go={setPage} />;
          case 'him-favorites': return <Favs role="him" />;
          case 'him-chat': return <Chat role="him" />;
          case 'him-calendar': return <Cal role="him" />;
          case 'him-map': return <Map role="him" />;
          default: return <Landing onEnter={goLogin} />;
        }
      };

      return (
        <>
          <PreviewNav current={page} onSelect={setPage} />
          <div key={page}>{renderPage()}</div>
        </>
      );
    }

    // Wait for component scripts to register on window
    function mount() {
      if (!window.LandingPage || !window.HomePage) {
        return setTimeout(mount, 50);
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    mount();
  </script>
</body>
</html>
